; PlatformIO Project Configuration File
;
; Pure SPI bring-up uses ESP8266 RTOS SDK, not Arduino SPISlave.
; Build target kept as esp8285 so existing scripts do not need an env change.

[env:esp8285]
platform = espressif8266@2.6.3
board = esp8285
framework = esp8266-rtos-sdk
monitor_speed = 115200
upload_speed = 921600
board_build.flash_mode = dout
board_build.f_flash = 20000000L
build_flags =
    -DF_CRYSTAL=40000000
    -DKESP_VERSION=\"0.2.0-rtos-spi\"
extra_scripts = post:tools/merge_image.py
