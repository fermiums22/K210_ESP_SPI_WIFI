; PlatformIO Project Configuration File
;
; Wi-Fi TCP -> ESP8285 SPI slave -> K210 SD bridge.
; This branch still keeps RTOS bring-up files, but normal payload build uses
; the Arduino ESP8266 SPISlave bridge from src/main.cpp.

[env:esp8285]
platform = espressif8266@2.6.3
board = esp8285
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.flash_mode = dout
board_build.f_flash = 20000000L
src_filter = +<main.cpp> -<main.c>
build_flags =
    -DF_CRYSTAL=40000000
    -DKESP_VERSION=\"0.3.0-wifi-spi-sd\"
extra_scripts = post:tools/merge_image.py
